<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revolution JPII | Inicio</title>
    <style>
        :root {
            --bg-base: #030305;
            --accent: #00e5ff;
            --text-main: #ffffff;
            --text-dim: #8892b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(3, 3, 5, 0.8); border-bottom: 1px solid rgba(0, 229, 255, 0.1); }
        .logo-nav { display: flex; align-items: center; gap: 15px; font-weight: 800; font-size: 20px; letter-spacing: 2px; }
        .logo-nav img { width: 35px; height: 35px; border-radius: 8px; border: 1px solid var(--accent); }
        
        /* El botón ahora es un enlace (etiqueta a) */
        .btn-ingreso { background: rgba(0, 229, 255, 0.1); color: var(--accent); border: 1px solid var(--accent); padding: 10px 25px; border-radius: 30px; font-weight: bold; text-decoration: none; transition: 0.3s; }
        .btn-ingreso:hover { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(0,229,255,0.3); }

        #vista-inicio { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        h1 { font-size: 5rem; font-weight: 900; margin-bottom: 20px; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitulo { font-size: 1.2rem; color: var(--text-dim); max-width: 600px; margin-bottom: 50px; line-height: 1.6; }
        .pilares { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .pilar { padding: 10px 25px; border-radius: 5px; border-left: 3px solid var(--accent); background: rgba(255,255,255,0.03); font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div class="logo-nav">
            <img src="fenix-logo.jpg" alt="F" onerror="this.style.display='none'"> 
            REVOLUTION JPII
        </div>
        <a href="fenix.html" class="btn-ingreso">Acceso Inteligente</a>
    </nav>

    <div id="vista-inicio">
        <h1>El Futuro del JPII</h1>
        <p class="subtitulo">Una campaña basada en la transparencia, el liderazgo estudiantil y la integración de Inteligencia Artificial.</p>
        <div class="pilares">
            <div class="pilar">AMA LLULLA</div>
            <div class="pilar">AMA SUA</div>
            <div class="pilar">AMA QUELLA</div>
        </div>
    </div>
</body>
</html>
</html>
