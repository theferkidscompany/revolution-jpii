<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fénix Core | AI</title>
    <style>
        :root {
            --bg-base: #030305;
            --bg-panel: #0a0a0f;
            --accent: #00e5ff;
            --text-main: #ffffff;
            --text-dim: #8892b0;
            --bubble-user: #1e1e24;
            --bubble-ia: transparent;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* HEADER SENCILLO PARA VOLVER */
        .top-bar { padding: 15px 30px; background: var(--bg-panel); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .back-link { color: var(--text-dim); text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .back-link:hover { color: var(--accent); }
        
        /* LOGIN */
        #login-screen { position: absolute; top: 60px; left: 0; width: 100%; height: calc(100vh - 60px); display: flex; justify-content: center; align-items: center; z-index: 500; background: var(--bg-base); }
        .login-box { background: var(--bg-panel); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .login-box img { width: 80px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--accent); }
        .input-form { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; outline: none; }
        .btn-full { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); }
        .error-msg { color: #ff4d4d; font-size: 13px; display: none; margin-top: 10px; }

        /* CHAT INTERFAZ */
        #chat-app { display: none; width: 100%; height: calc(100vh - 60px); }
        .sidebar { width: 280px; background: var(--bg-panel); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 20px; }
        .user-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(0, 229, 255, 0.05); border-radius: 15px; margin-bottom: 20px; }
        .user-card img { width: 40px; height: 40px; border-radius: 50%; }
        
        /* BOTÓN NUEVO CHAT */
        .btn-nuevo-chat { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-bottom: auto; }
        .btn-nuevo-chat:hover { background: var(--accent); color: #000; }
        
        .btn-logout { background: transparent; border: none; color: var(--text-dim); padding: 15px; cursor: pointer; border-radius: 10px; transition: 0.3s; font-weight: bold; text-align: left; }
        .btn-logout:hover { color: #ff4d4d; }

        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        .mensajes-container { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 25px; }
        .bienvenida { text-align: center; margin: auto; opacity: 0.5; }
        
        .fila-msg { display: flex; gap: 15px; width: 100%; max-width: 900px; margin: 0 auto; }
        .fila-msg.user { justify-content: flex-end; }
        .avatar-ia { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--accent); }
        .burbuja { padding: 15px 22px; font-size: 15px; line-height: 1.6; max-width: 80%; }
        .burbuja.user { background: var(--bubble-user); color: #fff; border-radius: 20px 20px 4px 20px; }
        .burbuja.ia { background: var(--bubble-ia); color: var(--text-main); padding-top: 5px; }

        #zona-carga-segura { display: none; padding: 0 40px 20px; }
        .indicador-carga { display: flex; gap: 5px; padding: 10px 0; }
        .punto { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite; }
        .punto:nth-child(2) { animation-delay: 0.2s; }
        .punto:nth-child(3) { animation-delay: 0.4s; }

        .zona-input { padding: 20px 40px; background: var(--bg-base); display: flex; justify-content: center; }
        .caja-input { width: 100%; max-width: 900px; display: flex; background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 8px 10px 8px 25px; }
        .caja-input input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 15px; }
        .btn-enviar { background: var(--text-main); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-link">← Volver al Inicio</a>
        <span style="font-weight:bold; color:var(--accent);">FÉXIX CORE</span>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <img src="fenix-logo.jpg" alt="Logo" onerror="this.style.display='none'">
            <h2>Fénix Core</h2>
            <p style="color:#888; margin-bottom:20px;">Acceso Estudiantil</p>
            <input type="email" id="email-in" class="input-form" placeholder="Correo electrónico">
            <input type="password" id="pass-in" class="input-form" placeholder="Contraseña">
            <button class="btn-full btn-primary" id="btn-login-mail">Iniciar Sesión</button>
            <button class="btn-full btn-secondary" id="btn-reg-mail">Crear Cuenta</button>
            <button class="btn-full btn-secondary" id="btn-google" style="margin-top:10px;">Continuar con Google</button>
            <div id="error-box" class="error-msg"></div>
        </div>
    </div>

    <div id="chat-app">
        <div class="sidebar">
            <div class="user-card">
                <img id="avatar-ui" src="" alt="U">
                <div class="user-info">
                    <h4 id="nombre-ui">Usuario</h4>
                </div>
            </div>
            
            <button class="btn-nuevo-chat" id="btn-nuevo-chat">+ Nuevo Chat</button>
            
            <button class="btn-logout" id="btn-salir">Cerrar Sesión</button>
        </div>

        <div class="chat-area">
            <div class="mensajes-container" id="contenedor-mensajes">
                <div class="bienvenida" id="bienvenida-msg">
                    <h2>¿Qué analizaremos hoy?</h2>
                </div>
            </div>

            <div id="zona-carga-segura">
                <div class="fila-msg ia">
                    <img src="fenix-logo.jpg" class="avatar-ia" onerror="this.style.display='none'">
                    <div class="burbuja ia indicador-carga"><div class="punto"></div><div class="punto"></div><div class="punto"></div></div>
                </div>
            </div>

            <div class="zona-input">
                <div class="caja-input">
                    <input type="text" id="input-chat" placeholder="Conéctate con el núcleo Fénix..." autocomplete="off">
                    <button class="btn-enviar" id="btn-enviar">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4mHFTQAbqLNNEfAMitv1joJ7iYdVs18I",
            authDomain: "fenix-jpii.firebaseapp.com",
            projectId: "fenix-jpii"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userActual = null;
        let unsubscribe = null; 
        const RUTA_LOGO = "fenix-logo.jpg";
        const URL_RENDER = "https://fenix-backend-uqbg.onrender.com/api/chat";

        const DOM = {
            login: document.getElementById('login-screen'),
            app: document.getElementById('chat-app'),
            error: document.getElementById('error-box'),
            mensajes: document.getElementById('contenedor-mensajes'),
            input: document.getElementById('input-chat'),
            bienvenida: document.getElementById('bienvenida-msg'),
            carga: document.getElementById('zona-carga-segura')
        };

        const showError = (msg) => { DOM.error.innerText = msg; DOM.error.style.display = 'block'; };

        document.getElementById('btn-google').addEventListener('click', async () => { try { await signInWithPopup(auth, provider); } catch(e) { showError("Error conectando."); }});
        document.getElementById('btn-login-mail').addEventListener('click', async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('email-in').value, document.getElementById('pass-in').value); } catch(e) { showError("Error de credenciales."); }});
        document.getElementById('btn-reg-mail').addEventListener('click', async () => { try { await createUserWithEmailAndPassword(auth, document.getElementById('email-in').value, document.getElementById('pass-in').value); } catch(e) { showError("Error al crear cuenta."); }});
        document.getElementById('btn-salir').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userActual = user;
                DOM.login.style.display = 'none';
                DOM.app.style.display = 'flex';
                
                const nombre = user.displayName || user.email.split('@')[0];
                document.getElementById('nombre-ui').innerText = nombre;
                document.getElementById('avatar-ui').src = user.photoURL || `https://ui-avatars.com/api/?name=${nombre}&background=00e5ff&color=000&bold=true`;
                
                iniciarChat();
            } else {
                userActual = null;
                DOM.app.style.display = 'none';
                DOM.login.style.display = 'flex';
                if(unsubscribe) unsubscribe();
            }
        });

        // NUEVO CHAT (Limpia la pantalla)
        document.getElementById('btn-nuevo-chat').addEventListener('click', () => {
            DOM.mensajes.innerHTML = '';
            DOM.mensajes.appendChild(DOM.bienvenida);
            DOM.bienvenida.style.display = 'block';
            
            // Si quieres que el nuevo chat NO guarde en el historial viejo, tendrías que cambiar de colección
            // Pero por ahora, solo limpiamos la pantalla para dar espacio fresco.
            if(unsubscribe) unsubscribe(); 
        });

        function iniciarChat() {
            if (!userActual) return;
            const q = query(collection(db, `chats_${userActual.uid}`), orderBy("timestamp", "asc"));
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                DOM.mensajes.innerHTML = ''; 
                if(snapshot.empty) {
                    DOM.mensajes.appendChild(DOM.bienvenida);
                    DOM.bienvenida.style.display = 'block';
                } else {
                    snapshot.forEach((doc) => renderizarMensaje(doc.data().texto, doc.data().emisor));
                    scrollAbajo();
                }
            });
        }

        async function enviarMsg() {
            const texto = DOM.input.value.trim();
            if (texto === "" || !userActual) return;
            DOM.input.value = "";
            
            const refChat = collection(db, `chats_${userActual.uid}`);
            
            try { await addDoc(refChat, { texto: texto, emisor: "user", timestamp: serverTimestamp() }); } catch(e) { return; }
            
            DOM.carga.style.display = 'block';
            scrollAbajo();

            try {
                const res = await fetch(URL_RENDER, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mensaje: texto }) });
                const data = await res.json();
                
                DOM.carga.style.display = 'none';
                
                if(data.respuesta) {
                    await addDoc(refChat, { texto: data.respuesta, emisor: "ia", timestamp: serverTimestamp() });
                } else if(data.error) {
                    await addDoc(refChat, { texto: "⚠️ " + data.error, emisor: "ia", timestamp: serverTimestamp() });
                }
            } catch (error) {
                DOM.carga.style.display = 'none';
                await addDoc(refChat, { texto: "🔌 Error de conexión.", emisor: "ia", timestamp: serverTimestamp() });
            }
        }

        function renderizarMensaje(texto, emisor) {
            const esUser = emisor === "user";
            const html = `
                <div class="fila-msg ${esUser ? 'user' : 'ia'}">
                    ${!esUser ? `<img src="${RUTA_LOGO}" class="avatar-ia" onerror="this.style.display='none'">` : ''}
                    <div class="burbuja ${esUser ? 'user' : 'ia'}">${texto.replace(/\n/g, '<br>')}</div>
                </div>
            `;
            DOM.mensajes.insertAdjacentHTML('beforeend', html);
        }

        function scrollAbajo() { DOM.mensajes.scrollTop = DOM.mensajes.scrollHeight; }
        
        document.getElementById('btn-enviar').addEventListener('click', enviarMsg);
        DOM.input.addEventListener("keypress", (e) => { if (e.key === "Enter") enviarMsg(); });
    </script>
</body>
</html>
