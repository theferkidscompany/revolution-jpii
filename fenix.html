<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fénix IA | Dashboard</title>
    <style>
        :root {
            --bg-deep: #030305;
            --bg-glass: rgba(10, 10, 15, 0.7);
            --accent: #00e5ff;
            --accent-dark: #0077ff;
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --glow: rgba(0, 229, 255, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: radial-gradient(circle at top right, #0a1128 0%, var(--bg-deep) 100%); color: var(--text-main); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* HEADER */
        .top-bar { padding: 15px 30px; background: rgba(3, 3, 5, 0.5); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 229, 255, 0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .back-link { color: var(--text-muted); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
        .back-link:hover { color: var(--accent); transform: translateX(-5px); }
        .brand-title { font-weight: 900; color: var(--accent); letter-spacing: 2px; text-shadow: 0 0 10px var(--glow); }

        /* LOGIN */
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 500; background: var(--bg-deep); }
        .login-box { background: var(--bg-glass); backdrop-filter: blur(20px); padding: 50px 40px; border-radius: 24px; width: 100%; max-width: 420px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .login-box img { width: 90px; height: 90px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--accent); box-shadow: 0 0 20px var(--glow); }
        .login-box h2 { font-size: 28px; margin-bottom: 5px; font-weight: 800; }
        .login-box p { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }
        
        .input-form { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; transition: 0.3s; }
        .input-form:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,229,255,0.2); }
        
        .btn-full { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .btn-primary { background: linear-gradient(90deg, var(--accent), var(--accent-dark)); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px var(--glow); }
        .btn-secondary { background: transparent; color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }
        .error-msg { color: #ff4d4d; font-size: 13px; display: none; margin-top: 15px; line-height: 1.4; padding: 10px; background: rgba(255, 77, 77, 0.1); border-radius: 8px; border: 1px solid rgba(255, 77, 77, 0.3);}
        .success-msg { color: #00e5ff; font-size: 13px; display: none; margin-top: 15px; line-height: 1.4; padding: 10px; background: rgba(0, 229, 255, 0.1); border-radius: 8px; border: 1px solid rgba(0, 229, 255, 0.3);}

        /* APP CHAT */
        #chat-app { display: none; width: 100%; height: calc(100vh - 56px); flex-direction: row; }
        
        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--bg-glass); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 25px 20px; }
        .user-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.1); border-radius: 15px; margin-bottom: 25px; }
        .user-card img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .user-info h4 { font-size: 15px; margin-bottom: 2px; }
        .user-info span { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-nuevo-chat { background: transparent; border: 1px dashed var(--accent); color: var(--accent); padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-nuevo-chat:hover { background: rgba(0, 229, 255, 0.1); box-shadow: 0 0 15px var(--glow); }

        .lista-chats { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .chat-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; color: var(--text-muted); font-size: 14px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .chat-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .chat-item.active { background: rgba(0, 229, 255, 0.1); color: var(--accent); border-color: rgba(0, 229, 255, 0.2); font-weight: bold; }

        .btn-logout { background: transparent; border: none; color: #666; padding: 15px; cursor: pointer; border-radius: 12px; transition: 0.3s; font-weight: bold; text-align: left; display: flex; align-items: center; gap: 10px; }
        .btn-logout:hover { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); }

        /* AREA CHAT CENTRAL */
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, rgba(0,229,255,0.02) 0%, transparent 70%); }
        .mensajes-container { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth; }
        
        .bienvenida { text-align: center; margin: auto; animation: fadeIn 1s; }
        .bienvenida img { width: 120px; height: 120px; border-radius: 30px; filter: grayscale(100%) opacity(0.3); margin-bottom: 20px; }
        .bienvenida h2 { font-size: 24px; color: var(--text-muted); font-weight: 400; }
        
        .fila-msg { display: flex; gap: 15px; width: 100%; max-width: 900px; margin: 0 auto; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .fila-msg.user { justify-content: flex-end; }
        .avatar-ia { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--accent); object-fit: cover; box-shadow: 0 0 10px var(--glow); flex-shrink: 0; }
        
        .burbuja { padding: 16px 24px; font-size: 15px; line-height: 1.7; max-width: 80%; letter-spacing: 0.3px; }
        .burbuja.user { background: linear-gradient(135deg, var(--accent-dark), var(--accent)); color: #fff; border-radius: 20px 20px 4px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-weight: 500; }
        .burbuja.ia { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: var(--text-main); border-radius: 4px 20px 20px 20px; backdrop-filter: blur(10px); }

        /* CARGA ANIMADA */
        #zona-carga-segura { display: none; padding: 0 40px 20px; }
        .indicador-carga { display: flex; gap: 6px; padding: 10px 0; }
        .punto { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .punto:nth-child(1) { animation-delay: -0.32s; }
        .punto:nth-child(2) { animation-delay: -0.16s; }

        /* ZONA INPUT */
        .zona-input { padding: 20px 40px 40px; display: flex; justify-content: center; background: linear-gradient(transparent, var(--bg-deep) 80%); }
        .caja-input { width: 100%; max-width: 900px; display: flex; background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 10px 10px 10px 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transition: 0.3s; }
        .caja-input:focus-within { border-color: var(--accent); box-shadow: 0 10px 40px var(--glow); }
        .caja-input input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 15px; }
        .btn-enviar { background: var(--text-main); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-enviar:hover { background: var(--accent); transform: scale(1.1); box-shadow: 0 0 15px var(--glow); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); box-shadow: 0 0 10px var(--accent); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Volver a Revolution JPII
        </a>
        <span class="brand-title">FÉNIX IA</span>
    </div>

    <div id="login-screen">
        <div class="login-box">
            <img src="fenix-logo.jpg" alt="Logo" onerror="this.style.display='none'">
            <h2>Fénix IA</h2>
            <p>Acceso Seguro Estudiantil</p>
            
            <input type="email" id="email-in" class="input-form" placeholder="Correo electrónico">
            <input type="password" id="pass-in" class="input-form" placeholder="Contraseña secreta">
            
            <button class="btn-full btn-primary" id="btn-login-mail">Iniciar Sesión</button>
            <button class="btn-full btn-secondary" id="btn-reg-mail">Crear Cuenta (Requiere Verificación)</button>
            
            <div style="margin:20px 0; display: flex; align-items: center; justify-content: center;">
                <span style="height: 1px; background: rgba(255,255,255,0.1); flex: 1;"></span>
                <span style="color:#555; font-size:12px; margin: 0 10px;">O INGRESA CON</span>
                <span style="height: 1px; background: rgba(255,255,255,0.1); flex: 1;"></span>
            </div>
            
            <button class="btn-full btn-secondary" id="btn-google" style="display:flex; justify-content:center; align-items:center; gap:10px;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
                Google
            </button>
            <div id="error-box" class="error-msg"></div>
            <div id="success-box" class="success-msg"></div>
        </div>
    </div>

    <div id="chat-app">
        <div class="sidebar">
            <div class="user-card">
                <img id="avatar-ui" src="" alt="U">
                <div class="user-info">
                    <h4 id="nombre-ui">Usuario</h4>
                    <span>Estudiante JPII</span>
                </div>
            </div>
            
            <button class="btn-nuevo-chat" id="btn-nuevo-chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Nuevo Chat
            </button>
            
            <div class="lista-chats" id="lista-chats"></div>

            <button class="btn-logout" id="btn-salir">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Cerrar Sesión
            </button>
        </div>

        <div class="chat-area">
            <div class="mensajes-container" id="contenedor-mensajes">
                <div class="bienvenida" id="bienvenida-msg">
                    <img src="fenix-logo.jpg" alt="Fenix" onerror="this.style.display='none'">
                    <h2>¿Qué analizaremos hoy?</h2>
                </div>
            </div>

            <div id="zona-carga-segura">
                <div class="fila-msg ia">
                    <img src="fenix-logo.jpg" class="avatar-ia" onerror="this.style.display='none'">
                    <div class="burbuja ia indicador-carga"><div class="punto"></div><div class="punto"></div><div class="punto"></div></div>
                </div>
            </div>

            <div class="zona-input">
                <div class="caja-input">
                    <input type="text" id="input-chat" placeholder="Escribe tu mensaje para Fénix IA..." autocomplete="off">
                    <button class="btn-enviar" id="btn-enviar">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // AGREGADO: sendEmailVerification
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4mHFTQAbqLNNEfAMitv1joJ7iYdVs18I",
            authDomain: "fenix-jpii.firebaseapp.com",
            projectId: "fenix-jpii"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userActual = null;
        let chatActualId = null; 
        let unsubscribeMensajes = null; 
        let unsubscribeLista = null;

        const RUTA_LOGO = "fenix-logo.jpg";
        const URL_RENDER = "https://fenix-backend-uqbg.onrender.com/api/chat";

        const DOM = {
            login: document.getElementById('login-screen'),
            app: document.getElementById('chat-app'),
            error: document.getElementById('error-box'),
            success: document.getElementById('success-box'),
            listaChats: document.getElementById('lista-chats'),
            mensajes: document.getElementById('contenedor-mensajes'),
            input: document.getElementById('input-chat'),
            bienvenida: document.getElementById('bienvenida-msg'),
            carga: document.getElementById('zona-carga-segura')
        };

        const showError = (msg) => { DOM.success.style.display = 'none'; DOM.error.innerText = msg; DOM.error.style.display = 'block'; };
        const showSuccess = (msg) => { DOM.error.style.display = 'none'; DOM.success.innerText = msg; DOM.success.style.display = 'block'; };

        // ================= AUTHENTICATION LOGIC =================

        // 1. Google Auth (No requiere verificación de correo adicional)
        document.getElementById('btn-google').addEventListener('click', async () => { 
            try { 
                await signInWithPopup(auth, provider); 
            } catch(e) { 
                showError("Asegúrate de haber agregado '127.0.0.1' en Dominios Autorizados de Firebase."); 
            }
        });

        // 2. Login con Correo (Con filtro Anti-Bots / No verificados)
        document.getElementById('btn-login-mail').addEventListener('click', async () => { 
            try { 
                const cred = await signInWithEmailAndPassword(auth, document.getElementById('email-in').value, document.getElementById('pass-in').value); 
                
                // Si entra con correo, bloqueamos si no lo ha verificado
                if (!cred.user.emailVerified) {
                    showError("⚠️ Cuenta NO Verificada. Por favor, revisa la bandeja de entrada de tu correo (o la carpeta de SPAM) y haz clic en el enlace de verificación de Firebase antes de entrar.");
                    await signOut(auth); // Lo sacamos a patadas
                }
            } catch(e) { 
                showError("Correo o contraseña incorrectos, o la cuenta no existe."); 
            }
        });

        // 3. Registro Anti-Bots (Manda correo)
        document.getElementById('btn-reg-mail').addEventListener('click', async () => { 
            try { 
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById('email-in').value, document.getElementById('pass-in').value); 
                
                // Manda el correo oficial de Firebase
                await sendEmailVerification(cred.user);
                
                showSuccess("✅ ¡CUENTA CREADA!\nTe acabamos de enviar un enlace a tu correo. Ábrelo para verificar que eres humano. Luego podrás iniciar sesión.");
                
                // Lo cerramos automáticamente para que tenga que ir a su correo
                await signOut(auth);
            } catch(e) { 
                showError("Error: El correo ya está registrado o la contraseña es muy débil (Mínimo 6 letras/números)."); 
            }
        });

        document.getElementById('btn-salir').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Doble chequeo de seguridad (Por si Firebase intenta loguearlo automáticamente tras crear cuenta)
                if(user.providerData[0].providerId === 'password' && !user.emailVerified) {
                    return; // No lo dejamos pasar
                }

                userActual = user;
                DOM.login.style.display = 'none';
                DOM.app.style.display = 'flex';
                
                const nombre = user.displayName || user.email.split('@')[0];
                document.getElementById('nombre-ui').innerText = nombre;
                document.getElementById('avatar-ui').src = user.photoURL || `https://ui-avatars.com/api/?name=${nombre}&background=00e5ff&color=000&bold=true`;
                
                cargarHistorialDeChats();
            } else {
                userActual = null;
                chatActualId = null;
                DOM.app.style.display = 'none';
                DOM.login.style.display = 'flex';
                if(unsubscribeMensajes) unsubscribeMensajes();
                if(unsubscribeLista) unsubscribeLista();
            }
        });

        // ================= SISTEMA DE CHATS =================

        function cargarHistorialDeChats() {
            if (!userActual) return;
            const refChats = collection(db, `usuarios/${userActual.uid}/mis_chats`);
            const q = query(refChats, orderBy("actualizado", "desc"));
            
            unsubscribeLista = onSnapshot(q, (snapshot) => {
                DOM.listaChats.innerHTML = '';
                
                if(snapshot.empty && !chatActualId) {
                    crearNuevoChat("Chat 1");
                    return;
                }

                let esElPrimero = true;
                snapshot.forEach((documento) => {
                    const data = documento.data();
                    const div = document.createElement('div');
                    div.className = `chat-item ${documento.id === chatActualId ? 'active' : ''}`;
                    div.innerText = data.titulo || "Chat";
                    
                    div.onclick = () => abrirChat(documento.id);
                    DOM.listaChats.appendChild(div);

                    if(esElPrimero && !chatActualId) {
                        abrirChat(documento.id);
                    }
                    esElPrimero = false;
                });
            });
        }

        async function crearNuevoChat(nombreOpcional) {
            if (!userActual) return;
            const refChats = collection(db, `usuarios/${userActual.uid}/mis_chats`);
            const numChats = document.querySelectorAll('.chat-item').length + 1;
            const tituloNuevo = nombreOpcional || `Chat ${numChats}`;
            
            const nuevoDoc = await addDoc(refChats, { 
                titulo: tituloNuevo, 
                actualizado: serverTimestamp() 
            });
            abrirChat(nuevoDoc.id);
        }

        document.getElementById('btn-nuevo-chat').addEventListener('click', () => crearNuevoChat());

        function abrirChat(idChat) {
            chatActualId = idChat;
            document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
            
            if(unsubscribeMensajes) unsubscribeMensajes();
            
            const refMensajes = collection(db, `usuarios/${userActual.uid}/mis_chats/${chatActualId}/mensajes`);
            const q = query(refMensajes, orderBy("timestamp", "asc"));
            
            unsubscribeMensajes = onSnapshot(q, (snapshot) => {
                DOM.mensajes.innerHTML = ''; 
                if(snapshot.empty) {
                    DOM.mensajes.appendChild(DOM.bienvenida);
                    DOM.bienvenida.style.display = 'block';
                } else {
                    snapshot.forEach((doc) => renderizarMensaje(doc.data().texto, doc.data().emisor));
                    scrollAbajo();
                }
            });
        }

        async function enviarMsg() {
            const texto = DOM.input.value.trim();
            if (texto === "" || !userActual || !chatActualId) return;
            DOM.input.value = "";
            
            const refMensajes = collection(db, `usuarios/${userActual.uid}/mis_chats/${chatActualId}/mensajes`);
            const refChatPrincipal = doc(db, `usuarios/${userActual.uid}/mis_chats/${chatActualId}`);
            
            try { 
                await addDoc(refMensajes, { texto: texto, emisor: "user", timestamp: serverTimestamp() }); 
                await updateDoc(refChatPrincipal, { actualizado: serverTimestamp() });
            } catch(e) { return; }
            
            DOM.carga.style.display = 'block';
            scrollAbajo();

            try {
                const res = await fetch(URL_RENDER, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mensaje: texto }) });
                const data = await res.json();
                
                DOM.carga.style.display = 'none';
                
                if(data.respuesta) {
                    await addDoc(refMensajes, { texto: data.respuesta, emisor: "ia", timestamp: serverTimestamp() });
                } else if(data.error) {
                    await addDoc(refMensajes, { texto: "⚠️ " + data.error, emisor: "ia", timestamp: serverTimestamp() });
                }
            } catch (error) {
                DOM.carga.style.display = 'none';
                await addDoc(refMensajes, { texto: "🔌 Error de conexión con Fénix.", emisor: "ia", timestamp: serverTimestamp() });
            }
        }

        function renderizarMensaje(texto, emisor) {
            const esUser = emisor === "user";
            const html = `
                <div class="fila-msg ${esUser ? 'user' : 'ia'}">
                    ${!esUser ? `<img src="${RUTA_LOGO}" class="avatar-ia" onerror="this.style.display='none'">` : ''}
                    <div class="burbuja ${esUser ? 'user' : 'ia'}">${texto.replace(/\n/g, '<br>')}</div>
                </div>
            `;
            DOM.mensajes.insertAdjacentHTML('beforeend', html);
        }

        function scrollAbajo() { DOM.mensajes.scrollTop = DOM.mensajes.scrollHeight; }
        document.getElementById('btn-enviar').addEventListener('click', enviarMsg);
        DOM.input.addEventListener("keypress", (e) => { if (e.key === "Enter") enviarMsg(); });
    </script>
</body>
</html>
